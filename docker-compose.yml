services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-educrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-educrm}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-educrm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off job: syncs lib/db's Drizzle schema into the database. Runs once
  # per `docker compose up` and exits; api-server waits for it to finish
  # successfully before it starts.
  db-push:
    build:
      context: .
      dockerfile: Dockerfile.api-server
      target: build
    command: ["pnpm", "--filter", "@workspace/db", "run", "push-force"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-educrm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-educrm}
    depends_on:
      db:
        condition: service_healthy

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-educrm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-educrm}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY in .env}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?set CLERK_PUBLISHABLE_KEY in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
    depends_on:
      db-push:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  crm:
    build:
      context: .
      dockerfile: Dockerfile.crm
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?set VITE_CLERK_PUBLISHABLE_KEY in .env}
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      - api-server
    ports:
      - "80:80"

volumes:
  db-data:
